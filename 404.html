<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
<title>404 | RimWorld 攻略站</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1f; --bg-card: #24242b; --border: #333340;
    --text: #c8c8d0; --text-muted: #888896; --accent: #d4956b;
    --radius: 6px;
  }
  html { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  h1 { font-size: 5rem; color: var(--accent); margin-bottom: 8px; line-height: 1; }
  h2 { font-size: 1.4rem; color: #fff; margin-bottom: 8px; }
  p { color: var(--text-muted); margin-bottom: 32px; max-width: 400px; }
  .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .links a {
    display: inline-block; padding: 10px 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); text-decoration: none;
    font-size: 0.9rem; transition: 0.2s ease;
  }
  .links a:hover { border-color: var(--accent); color: var(--accent); }
  .links .primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .links .primary:hover { opacity: 0.85; }
</style>
</head>
<body>
  <h1>404</h1>
  <h2>页面跑丢了 🪐</h2>
  <p>这个页面大概被海盗劫走了……也可能是链接打错了。</p>
  <div class="links">
    <a href="/" class="primary">🏠 攻略首页</a>
    <a href="/en/">English Guide</a>
    <a href="/about.html">关于本站</a>
  </div>
</body>
</html>
